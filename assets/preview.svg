<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Inter, sans-serif">
  <defs>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#6C4AE0"/><stop offset="1" stop-color="#3DDC84"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6C4AE0"/><stop offset="0.55" stop-color="#3A8FE0"/><stop offset="1" stop-color="#3DDC84"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6C4AE0"/><stop offset="1" stop-color="#241a63"/>
    </linearGradient>
  </defs>

  <!-- canvas -->
  <rect width="1200" height="680" fill="#101119"/>

  <!-- ===== sidebar ===== -->
  <rect x="16" y="16" width="188" height="648" rx="18" fill="#0A0A0C"/>
  <rect x="40" y="40" width="16" height="16" rx="5" fill="url(#accent)"/>
  <text x="64" y="53" fill="#EAECF2" font-size="15" font-weight="700">Saffron<tspan fill="#8B7BF0">Metrics</tspan></text>
  <line x1="40" y1="78" x2="180" y2="78" stroke="#20222e"/>
  <!-- slicers -->
  <g fill="#9AA0AE" font-size="10">
    <text x="40" y="118">REGION</text><rect x="40" y="126" width="140" height="30" rx="8" fill="#16171F" stroke="#262838"/>
    <text x="40" y="182">CUISINE</text><rect x="40" y="190" width="140" height="30" rx="8" fill="#16171F" stroke="#262838"/>
    <text x="40" y="246">SEGMENT</text><rect x="40" y="254" width="140" height="30" rx="8" fill="#16171F" stroke="#262838"/>
    <text x="40" y="310">CITY</text><rect x="40" y="318" width="140" height="30" rx="8" fill="#16171F" stroke="#262838"/>
  </g>
  <circle cx="70" cy="620" r="16" fill="#16171F" stroke="#262838"/><path d="M74 614l-6 6 6 6" stroke="#9AA0AE" stroke-width="2" fill="none"/>
  <circle cx="150" cy="620" r="16" fill="url(#accent)"/><path d="M146 614l6 6-6 6" stroke="#fff" stroke-width="2" fill="none"/>

  <!-- ===== header ===== -->
  <text x="228" y="52" fill="#ffffff" font-size="24" font-weight="700">Executive Overview</text>
  <text x="228" y="74" fill="#9AA0AE" font-size="13">Bangalore Food-Delivery Analytics · Jan 2023 – Sep 2025</text>
  <!-- year tiles -->
  <g font-size="12">
    <rect x="820" y="34" width="70" height="34" rx="9" fill="#16171F" stroke="#262838"/><text x="843" y="56" fill="#9AA0AE">2023</text>
    <rect x="896" y="34" width="70" height="34" rx="9" fill="#16171F" stroke="#262838"/><text x="919" y="56" fill="#9AA0AE">2024</text>
    <rect x="972" y="34" width="70" height="34" rx="9" fill="url(#accent)"/><text x="995" y="56" fill="#fff" font-weight="600">2025</text>
    <rect x="1048" y="34" width="36" height="34" rx="9" fill="#6C4AE0"/><path d="M1058 44h16l-6 7v6l-4 2v-8z" fill="#fff"/>
  </g>

  <!-- ===== KPI cards ===== -->
  <g>
    <!-- card 1 -->
    <rect x="228" y="100" width="212" height="96" rx="14" fill="#16171F" stroke="#262838"/>
    <text x="248" y="140" fill="#ffffff" font-size="26" font-weight="700">₹164.9M</text>
    <text x="248" y="162" fill="#9AA0AE" font-size="12">Total Revenue</text>
    <text x="248" y="182" fill="#3DDC84" font-size="11">▲ vs PY</text>
    <polyline points="360,175 372,168 384,172 396,158 408,164 420,150" fill="none" stroke="#8B7BF0" stroke-width="2"/>
    <!-- card 2 -->
    <rect x="452" y="100" width="212" height="96" rx="14" fill="#16171F" stroke="#262838"/>
    <text x="472" y="140" fill="#ffffff" font-size="26" font-weight="700">200K</text>
    <text x="472" y="162" fill="#9AA0AE" font-size="12">Total Orders</text>
    <text x="472" y="182" fill="#3DDC84" font-size="11">▲ vs PY</text>
    <polyline points="584,172 596,166 608,170 620,160 632,166 644,152" fill="none" stroke="#3A8FE0" stroke-width="2"/>
    <!-- card 3 -->
    <rect x="676" y="100" width="212" height="96" rx="14" fill="#16171F" stroke="#262838"/>
    <text x="696" y="140" fill="#ffffff" font-size="26" font-weight="700">₹825</text>
    <text x="696" y="162" fill="#9AA0AE" font-size="12">Avg Order Value</text>
    <text x="696" y="182" fill="#3DDC84" font-size="11">▲ vs PY</text>
    <polyline points="808,170 820,164 832,168 844,158 856,162 868,150" fill="none" stroke="#3DDC84" stroke-width="2"/>
    <!-- card 4 -->
    <rect x="900" y="100" width="184" height="96" rx="14" fill="#16171F" stroke="#262838"/>
    <text x="920" y="140" fill="#ffffff" font-size="26" font-weight="700">44.5m</text>
    <text x="920" y="162" fill="#9AA0AE" font-size="12">Avg Delivery</text>
    <text x="920" y="182" fill="#F5B54B" font-size="11">48% past SLA</text>
    <polyline points="1012,168 1024,172 1036,162 1048,168 1060,158 1072,166" fill="none" stroke="#F5B54B" stroke-width="2"/>
  </g>

  <!-- ===== bar chart card ===== -->
  <rect x="228" y="212" width="470" height="440" rx="16" fill="#16171F" stroke="#262838"/>
  <text x="252" y="248" fill="#EAECF2" font-size="15" font-weight="600">Orders by Location</text>
  <g>
    <!-- axis -->
    <line x1="360" y1="290" x2="360" y2="600" stroke="#22232c"/>
    <!-- bars: BTM 100%, HSR 49%, Kora 49%, JP 44%, White 42% -->
    <rect x="360" y="300" width="300" height="34" rx="6" fill="url(#bar)"/><text x="252" y="322" fill="#9AA0AE" font-size="12">BTM</text><text x="670" y="322" fill="#EAECF2" font-size="12">5,125</text>
    <rect x="360" y="360" width="150" height="34" rx="6" fill="url(#bar)"/><text x="252" y="382" fill="#9AA0AE" font-size="12">HSR</text><text x="520" y="382" fill="#EAECF2" font-size="12">2,523</text>
    <rect x="360" y="420" width="148" height="34" rx="6" fill="url(#bar)"/><text x="252" y="442" fill="#9AA0AE" font-size="12">Koramangala</text><text x="518" y="442" fill="#EAECF2" font-size="12">2,504</text>
    <rect x="360" y="480" width="132" height="34" rx="6" fill="url(#bar)"/><text x="252" y="502" fill="#9AA0AE" font-size="12">JP Nagar</text><text x="502" y="502" fill="#EAECF2" font-size="12">2,235</text>
    <rect x="360" y="540" width="126" height="34" rx="6" fill="url(#bar)"/><text x="252" y="562" fill="#9AA0AE" font-size="12">Whitefield</text><text x="496" y="562" fill="#EAECF2" font-size="12">2,144</text>
  </g>

  <!-- ===== donut card ===== -->
  <rect x="710" y="212" width="220" height="215" rx="16" fill="#16171F" stroke="#262838"/>
  <text x="734" y="248" fill="#EAECF2" font-size="15" font-weight="600">Order Status</text>
  <g transform="rotate(-90 820 335)" fill="none" stroke-width="18">
    <circle cx="820" cy="335" r="46" stroke="#3DDC84" stroke-dasharray="231.6 57.4"/>
    <circle cx="820" cy="335" r="46" stroke="#F5B54B" stroke-dasharray="28.6 260.4" stroke-dashoffset="-231.6"/>
    <circle cx="820" cy="335" r="46" stroke="#F43F5E" stroke-dasharray="28.9 260.1" stroke-dashoffset="-260.2"/>
  </g>
  <text x="820" y="332" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">200K</text>
  <text x="820" y="350" fill="#9AA0AE" font-size="10" text-anchor="middle">orders</text>
  <g font-size="10">
    <rect x="734" y="398" width="9" height="9" rx="2" fill="#3DDC84"/><text x="748" y="406" fill="#9AA0AE">Delivered 80%</text>
    <rect x="838" y="398" width="9" height="9" rx="2" fill="#F5B54B"/><text x="852" y="406" fill="#9AA0AE">Delayed 10%</text>
  </g>

  <!-- ===== line trend card ===== -->
  <rect x="710" y="437" width="374" height="215" rx="16" fill="#16171F" stroke="#262838"/>
  <text x="734" y="473" fill="#EAECF2" font-size="15" font-weight="600">Revenue Trend</text>
  <polyline points="734,600 780,585 826,592 872,560 918,570 964,530 1010,545 1056,505"
            fill="none" stroke="url(#accent)" stroke-width="3"/>
  <polygon points="734,600 780,585 826,592 872,560 918,570 964,530 1010,545 1056,505 1056,630 734,630" fill="#6C4AE0" opacity="0.10"/>
  <g fill="#3DDC84"><circle cx="1056" cy="505" r="4"/></g>

  <!-- ===== hero mini panel (top-right accent) ===== -->
  <rect x="946" y="212" width="138" height="215" rx="16" fill="url(#hero)"/>
  <text x="966" y="250" fill="#ffffff" font-size="13" opacity="0.85">Repeat</text>
  <text x="966" y="292" fill="#ffffff" font-size="30" font-weight="700">20K</text>
  <text x="966" y="314" fill="#ffffff" font-size="12" opacity="0.8">customers</text>
  <text x="966" y="360" fill="#ffffff" font-size="13" opacity="0.85">Rating</text>
  <text x="966" y="398" fill="#ffffff" font-size="26" font-weight="700">3.70★</text>
</svg>
