<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SaffronMetrics — Bangalore Food-Delivery Analytics</title>
  <link rel="canonical" href="./website/" />
  <meta http-equiv="refresh" content="0; url=./website/" />
  <style>
    html,body{margin:0;height:100%;background:#101119;color:#EAECF2;
      font-family:'Segoe UI',system-ui,sans-serif;display:grid;place-items:center;text-align:center}
    .dot{width:14px;height:14px;border-radius:5px;display:inline-block;margin-bottom:14px;
      background:linear-gradient(135deg,#6C4AE0,#3DDC84);box-shadow:0 0 18px #6C4AE0}
    a{color:#8B7BF0}
    .spin{margin-top:18px;width:26px;height:26px;border:3px solid #262838;border-top-color:#6C4AE0;
      border-radius:50%;animation:s 1s linear infinite;display:inline-block}
    @keyframes s{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div>
    <div class="dot"></div>
    <h2>SaffronMetrics</h2>
    <p>Loading the dashboard… if it doesn't redirect, <a href="./website/">click here</a>.</p>
    <div class="spin"></div>
  </div>
  <script>location.replace('./website/');</script>
</body>
</html>
